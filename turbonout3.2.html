<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nitro Drift 2D - Turbonout</title>
<style>
body { 
    margin: 0; 
    overflow: hidden; 
    background: #000; 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: white;
    user-select: none;
}
canvas { 
    display: block; 
    transition: filter 0.5s ease;
}

/* Telas de Menu */
.screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: opacity 0.4s ease, visibility 0.4s ease;
}

.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* Menu Principal */
#mainMenu {
    background: radial-gradient(circle at 20% 50%, rgba(40, 40, 50, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%);
    justify-content: center;
    padding-left: 10%;
}

.menu-options {
    display: flex;
    flex-direction: column; 
    gap: 20px;
    margin-top: 30px;
}

.menu-logo {
    font-size: 100px; font-weight: 900; font-style: italic; text-transform: uppercase;
    margin: 0; letter-spacing: -6px;
    background: linear-gradient(180deg, #ffffff 30%, #a0a0a0 45%, #e74c3c 50%, #8e1e14 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px rgba(231, 76, 60, 0.6));
}

.menu-btn {
    position: relative;
    background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    border: none; 
    color: white; 
    font-size: 24px; 
    font-weight: 800;
    text-align: left; 
    text-transform: uppercase; 
    font-style: italic; 
    cursor: pointer;
    padding: 12px 40px; 
    width: 300px; 
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    transform: skewX(-20deg); 
    border-left: 4px solid rgba(231, 76, 60, 0.5);
    overflow: hidden;
}

.menu-btn span {
    display: inline-block;
    transform: skewX(20deg); 
}

.menu-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(231, 76, 60, 0.4), transparent);
    transition: 0.5s;
}

.menu-btn:hover {
    padding-left: 60px;
    background: linear-gradient(90deg, rgba(231, 76, 60, 0.3) 0%, transparent 100%);
    border-left: 8px solid #e74c3c;
    text-shadow: 0 0 10px #e74c3c;
    box-shadow: -10px 0 20px rgba(231, 76, 60, 0.2);
}

.menu-btn:hover::before {
    left: 100%;
}

/* Garagem */
#garageMenu {
    background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
    padding: 40px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
}

.garage-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    border-bottom: 2px solid rgba(231, 76, 60, 0.3);
    padding-bottom: 10px;
}

.car-selection {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-grow: 1;
    gap: 50px;
    overflow: hidden;
}

.miata-preview-container {
    position: relative;
    width: 300px;
    height: 500px;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
    cursor: ns-resize;
}

.car-display-wrapper {
    position: relative;
    transition: all 0.5s ease;
}

.car-entering {
    animation: carEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.car-exiting {
    animation: carExit 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes carEntry {
    0% { transform: translateY(600px) scale(0.9); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
}

@keyframes carExit {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-600px) scale(1.1); opacity: 0; }
}

.miata-body {
    position: relative;
    width: 80px;
    height: 160px;
    background: linear-gradient(to right, #a01a1a, #ff4d4d, #a01a1a);
    border-radius: 15px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(231, 76, 60, 0.3);
}

.skyline-body {
    position: relative;
    width: 85px;
    height: 180px;
    background: linear-gradient(to right, #1a3a6b, #3498db, #1a3a6b);
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(52, 152, 219, 0.3);
    overflow: hidden;
}

.skyline-stripes {
    position: absolute;
    top: 0; left: 25%; width: 50%; height: 100%;
    background: repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255,255,255,0.2) 15px, rgba(255,255,255,0.2) 25px);
}

.miata-body::before, .skyline-body::before {
    content: ''; position: absolute; top: 40px; left: 10px; width: 60px; height: 50px; background: #1c2833; border-radius: 5px;
}
.skyline-body::before { top: 45px; left: 10px; width: 65px; height: 55px; }

.miata-body::after, .skyline-body::after {
    content: ''; position: absolute; bottom: 25px; left: 15px; width: 50px; height: 25px; background: #1c2833; border-radius: 3px;
}
.skyline-body::after { bottom: 30px; left: 12px; width: 61px; height: 30px; }

.car-lights-container { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; }

.light-miata { width: 20px; height: 12px; background: rgba(255,255,255,0.15); border-radius: 3px; }

.light-skyline { 
    width: 24px; height: 10px; 
    background: linear-gradient(90deg, #fff, #ddd); 
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    position: relative;
    overflow: hidden;
}

/* --- BMW M3 GTR E46 Race Version --- */
.bmw-body {
    position: relative;
    width: 92px;
    height: 185px;
    background: linear-gradient(to right, #6b6b6b, #d4d4d4, #6b6b6b);
    border-radius: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(212, 212, 212, 0.3);
    overflow: visible;
}
.bmw-body::before { /* Para-brisas com decalque de corrida */
    content: ''; position: absolute; top: 50px; left: 12px; width: 68px; height: 45px; background: #1c2833; border-radius: 4px;
    border-top: 5px solid #000;
}
.bmw-body::after { /* Vidro Traseiro */
    content: ''; position: absolute; bottom: 35px; left: 16px; width: 60px; height: 35px; background: #1c2833; border-radius: 3px;
}
.bmw-stripes { /* Adesivos icônicos da M3 GTR */
    position: absolute; top: 0; left: 20px; width: 12px; height: 100%;
    background: repeating-linear-gradient(0deg, #003da5, #003da5 20%, #000 20%, #000 40%, #e21a2c 40%, #e21a2c 60%, transparent 60%, transparent 100%);
    opacity: 0.8;
}
.bmw-wing { /* Aerofólio de carbono */
    position: absolute; bottom: 8px; left: -5%; width: 110%; height: 16px;
    background: #111; border-radius: 2px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.8);
    z-index: 5;
}
.light-bmw { 
    width: 22px; height: 8px; 
    background: #fff; border-radius: 2px;
    box-shadow: 0 0 12px #fff, 0 0 25px #3498db;
}

/* Customização UI */
.car-info-box {
    background: rgba(0,0,0,0.8);
    padding: 30px;
    border-left: 5px solid #e74c3c;
    transform: skewX(-10deg);
    width: 420px;
    min-height: 400px;
    transition: all 0.4s ease;
    overflow: hidden;
    position: relative;
}

.car-info-content { 
    transform: skewX(10deg); 
    transition: all 0.4s ease;
}

.car-info-content.view-switching {
    opacity: 0;
    transform: skewX(10deg) translateX(30px);
}

.custom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

.custom-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.custom-card:hover {
    background: rgba(231, 76, 60, 0.2);
    border-color: #e74c3c;
    transform: scale(1.05);
}

.custom-card.selected {
    background: rgba(231, 76, 60, 0.4);
    border-color: #e74c3c;
    box-shadow: 0 0 15px rgba(231, 76, 60, 0.3);
}

.custom-card svg {
    width: 32px;
    height: 32px;
    fill: #fff;
    transition: fill 0.2s;
}

.custom-card:hover svg {
    fill: #e74c3c;
}

.custom-card span { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;}

.car-name-title { font-size: 38px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 5px; }

.hint-wrapper {
    margin: 30px auto 0;
    width: 600px;
    height: 60px;
    position: relative;
    overflow: hidden;
    transform: skewX(-20deg);
    border-left: 4px solid #e74c3c;
    background: linear-gradient(90deg, rgba(231, 76, 60, 0.15) 0%, transparent 100%);
    display: flex;
    align-items: center;
    box-shadow: -10px 0 20px rgba(231, 76, 60, 0.1);
}

.hint-text {
    position: absolute;
    width: 100%;
    padding: 0 40px;
    box-sizing: border-box;
    color: #fff;
    font-size: 14px;
    font-style: italic;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    transform: translateX(100%) skewX(20deg);
    opacity: 0;
}

.hint-text span {
    color: #e74c3c;
    margin-right: 8px;
}

.hint-text.active {
    transform: translateX(0) skewX(20deg);
    opacity: 1;
}

.game-ui { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.game-ui.visible { opacity: 1; pointer-events: auto; }

.gauge-container, .accelerometer {
    position: absolute; bottom: 30px; width: 120px; height: 120px;
    background: radial-gradient(circle, #1a1a1c 0%, #000 100%);
    border: 2px solid rgba(231, 76, 60, 0.4); border-radius: 50%;
    box-shadow: 0 0 25px rgba(0,0,0,0.7); overflow: hidden;
}

.gauge-container { right: 30px; }
.accelerometer { left: 30px; display: flex; align-items: center; justify-content: center; }
.accel-label { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 0.6em; font-weight: 900; color: rgba(231, 76, 60, 0.6); letter-spacing: 1px; }
.gauge-needle { position: absolute; bottom: 50%; left: 50%; width: 2px; height: 50px; background: linear-gradient(to top, #e74c3c 80%, transparent); transform-origin: bottom center; z-index: 5; }
.speed-digital { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 16px; font-weight: 900; color: #f1c40f; font-style: italic; }
.gear-display { position: absolute; bottom: 50px; width: 100%; text-align: center; font-size: 20px; font-weight: 900; color: #e74c3c; text-shadow: 0 0 5px rgba(231, 76, 60, 0.5); }
.accel-dot { width: 12px; height: 12px; background: #f1c40f; border-radius: 50%; box-shadow: 0 0 15px #f1c40f; position: relative; z-index: 10; }

/* --- GAMEPAD CURSOR --- */
#virtualCursor {
    position: absolute;
    width: 22px; height: 22px;
    background: rgba(231, 76, 60, 0.8);
    border: 2px solid #fff;
    border-radius: 50%;
    pointer-events: none; /* Permite que o 'clique' atravesse até o botão */
    z-index: 10000;
    display: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
}

/* --- HUD DE PEDAIS (PRESSÃO ANALÓGICA) --- */
.pedals-hud {
    position: absolute;
    bottom: 30px; 
    left: 170px; /* Posicionado próximo ao Medidor Força-G */
    display: flex; 
    gap: 15px;
    height: 120px;
}

.pedal-wrapper {
    position: relative;
    height: 100%;
}

.pedal-bg {
    width: 22px; 
    height: 100%;
    background: rgba(26, 26, 28, 0.8);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 5px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 10px #000;
}

.pedal-fill {
    position: absolute; 
    bottom: 0; 
    left: 0;
    width: 100%; 
    height: 0%; /* Será preenchido pelo JS via Gamepad */
    transition: height 0.03s linear;
}

.pedal-fill.brake { background: linear-gradient(to top, #900, #e74c3c); }
.pedal-fill.accel { background: linear-gradient(to top, #006400, #2ecc71); }

.pedal-label {
    position: absolute; 
    bottom: -22px; 
    left: 50%; 
    transform: translateX(-50%);
    font-size: 11px; 
    font-weight: 900; 
    color: rgba(255,255,255,0.6); 
    text-align: center;
}

</style>
</head>
<body>

<!-- Cursor Virtual do Gamepad para os Menus -->
<div id="virtualCursor"></div>

<div id="mainMenu" class="screen">
    <div class="menu-logo">Turbonout</div>
    <div style="font-size: 18px; color: #e74c3c; font-weight: 700; letter-spacing: 8px; text-transform: uppercase; margin-top: -10px;">DRIFT RACING</div>
    <div class="menu-options">
        <button class="menu-btn" onclick="startGame()"><span>Iniciar Corrida</span></button>
        <button class="menu-btn" onclick="openGarage()"><span>Garagem</span></button>
        <button class="menu-btn"><span>Configurações</span></button>
        <button class="menu-btn"><span>Sair</span></button>
    </div>
</div>

<div id="garageMenu" class="screen hidden">
    <div class="garage-header">
        <h1 style="font-style: italic; font-weight: 900; margin: 0;">MINHA GARAGEM</h1>
        <button class="menu-btn" onclick="showScreen('mainMenu')" style="font-size: 18px; width: auto;"><span>VOLTAR</span></button>
    </div>

    <div class="car-selection">
        <div class="miata-preview-container" id="garageContainer">
            <div id="garageCarDisplay" class="car-display-wrapper"></div>
        </div>
        <div class="car-info-box" id="infoBox">
            <div class="car-info-content" id="carInfo"></div>
        </div>
    </div>

    <div class="hint-wrapper">
        <div class="hint-text active"><span>DICA:</span>Use o scroll do mouse ou L1/R1 sobre o carro para trocar</div>
    </div>
</div>

<div class="game-ui" id="gameUI">
    <div class="accelerometer">
        <div class="accel-label">FORÇA-G</div>
        <div id="accelDot" class="accel-dot"></div>
    </div>
    
    <!-- HUD de Pedais (Freio e Acelerador) -->
    <div class="pedals-hud">
        <div class="pedal-wrapper">
            <div class="pedal-bg"><div id="brakeBar" class="pedal-fill brake"></div></div>
            <div class="pedal-label">BRK</div>
        </div>
        <div class="pedal-wrapper">
            <div class="pedal-bg"><div id="accelBar" class="pedal-fill accel"></div></div>
            <div class="pedal-label">ACC</div>
        </div>
    </div>

    <div class="gauge-container">
        <div id="gaugeFace" style="width:100%; height:100%; position:relative;"></div>
        <div id="gaugeNeedle" class="gauge-needle"></div>
        <div class="gear-display" id="gearDisp">N</div>
        <div class="speed-digital" id="speedDisp">0</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// --- ICONES SVG ---
const ICONS = {
    paint: `<svg viewBox="0 0 24 24"><path d="M12,3C7.58,3 4,4.79 4,7C4,9.21 7.58,11 12,11C16.42,11 20,9.21 20,7C20,4.79 16.42,3 12,3M4,9V12C4,14.21 7.58,16 12,16C16.42,16 20,12V9C18.16,10.22 15.22,11 12,11C8.78,11 5.84,10.22 4,9M4,14V17C4,19.21 7.58,21 12,21C16.42,21 20,17V14C18.16,15.22 15.22,16 12,16C8.78,16 5.84,15.22 4,14Z"/></svg>`,
    engine: `<svg viewBox="0 0 24 24"><path d="M7,4V6H17V4H7M22,12V14H20.42C20.1,15.74 19.06,17.26 17.58,18.21L18.5,21.5L16.5,22L15.36,18.89C14.33,19.6 13.21,20 12,20C10.79,20 9.67,19.6 8.64,18.89L7.5,22L5.5,21.5L6.42,18.21C4.94,17.26 3.9,15.74 3.58,14H2V12H3.58C3.9,10.26 4.94,8.74 6.42,7.79L5.5,4.5L7.5,4L8.64,7.11C9.67,6.4 10.79,6 12,6C13.21,6 14.33,6.4 15.36,7.11L16.5,4L18.5,4.5L17.58,7.79C19.06,8.74 20.1,10.26 20.42,12H22M12,10A4,4 0 0,0 8,14A4,4 0 0,0 12,18A4,4 0 0,0 16,14A4,4 0 0,0 12,10Z"/></svg>`,
    turbo: `<svg viewBox="0 0 24 24"><path d="M12,2C6.48,2 2,6.48 2,12C2,17.52 6.48,22 12,22C17.52,22 22,17.52 22,12C22,6.48 17.52,2,12,2M12,20C7.58,20 4,16.42 4,12C4,7.58 7.58,4 12,4C16.42,4 20,7.58 20,12C20,16.42 16.42,20 12,20M12,11A1,1 0 0,1 13,12A1,1 0 0,1 12,13A1,1 0 0,1 11,12A1,1 0 0,1 12,11M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8M12,14.5A2.5,2.5 0 0,1 9.5,12A2.5,2.5 0 0,1 12,9.5A2.5,2.5 0 0,1 14.5,12A2.5,2.5 0 0,1 12,14.5Z"/></svg>`,
    ecu: `<svg viewBox="0 0 24 24"><path d="M21,16.5C21,16.88 20.79,17.21 20.47,17.38L12.57,21.82C12.41,21.94 12.21,22 12,22C11.79,22 11.59,21.94 11.43,21.82L3.53,17.38C3.21,17.21 3,16.88 3,16.5V7.5C3,7.12 3.21,6.79 3.53,6.62L11.43,2.18C11.59,2.06 11.79,2 12,2C12.21,2 12.41,2.06 12.57,2.18L20.47,6.62C20.79,6.79 21,7.12 21,7.5V16.5Z"/></svg>`
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const screens = {
    mainMenu: document.getElementById('mainMenu'),
    garageMenu: document.getElementById('garageMenu'),
    gameUI: document.getElementById('gameUI')
};

// Gamepad Variables
let gpInput = { steer: 0, accel: 0, brake: 0, handbrake: false };
let vCursor = { x: window.innerWidth/2, y: window.innerHeight/2 };
let lastBtnA = false, lastBtnL1 = false, lastBtnR1 = false;

// --- AUDIO ENGINE REFINADO ---
let audioCtx;
let engineOsc, engineOsc2, engineGain;
let turboSpoolOsc, turboSpoolGain, turboVibrato;
let turboAirNoise, turboAirGain; 
let noiseBuffer; 

// --- Straight-Cut Gearbox Variables ---
let gearOsc1, gearOsc2, gearOsc3, gearGain, gearFilter;
let smoothedShaftRPM = 0; // Simula a inércia rotacional do câmbio
let gearVibrato, gearVibratoGain; // LFO 
let lastShiftTime = 0; // Captura o momento exato da troca para o corte de torque

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 1. Motor encorpado
    engineOsc = audioCtx.createOscillator();
    engineOsc.type = 'sawtooth';
    engineOsc2 = audioCtx.createOscillator();
    engineOsc2.type = 'square';
    const engine2Gain = audioCtx.createGain();
    engine2Gain.gain.value = 0.3;
    engineGain = audioCtx.createGain();
    engineGain.gain.value = 0;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 900;

    engineOsc.connect(filter);
    engineOsc2.connect(engine2Gain);
    engine2Gain.connect(filter);
    filter.connect(engineGain);
    engineGain.connect(audioCtx.destination);
    engineOsc.start();
    engineOsc2.start();

    // 2. Assobio Realista do Turbo
    turboSpoolOsc = audioCtx.createOscillator();
    turboSpoolOsc.type = 'sine';
    turboVibrato = audioCtx.createOscillator();
    turboVibrato.frequency.value = 25;
    const vibratoGain = audioCtx.createGain();
    vibratoGain.gain.value = 15;
    turboVibrato.connect(vibratoGain);
    vibratoGain.connect(turboSpoolOsc.frequency);
    turboVibrato.start();

    turboSpoolGain = audioCtx.createGain();
    turboSpoolGain.gain.value = 0;
    const turboFilter = audioCtx.createBiquadFilter();
    turboFilter.type = 'highpass';
    turboFilter.frequency.value = 1800;
    turboSpoolOsc.connect(turboFilter);
    turboFilter.connect(turboSpoolGain);
    turboSpoolGain.connect(audioCtx.destination);
    turboSpoolOsc.start();

    // 3. Ruído de Ar (White Noise)
    const bufferSize = audioCtx.sampleRate * 2;
    noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const noiseData = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) noiseData[i] = Math.random() * 2 - 1;

    turboAirNoise = audioCtx.createBufferSource();
    turboAirNoise.buffer = noiseBuffer;
    turboAirNoise.loop = true;
    turboAirGain = audioCtx.createGain();
    turboAirGain.gain.value = 0;
    const airFilter = audioCtx.createBiquadFilter();
    airFilter.type = 'bandpass';
    airFilter.frequency.value = 4000;
    airFilter.Q.value = 0.5;
    turboAirNoise.connect(airFilter);
    airFilter.connect(turboAirGain);
    turboAirGain.connect(audioCtx.destination);
    turboAirNoise.start();

    // 4. Straight-cut Gearbox Whine (Câmbio de Dentes Retos)
    gearOsc1 = audioCtx.createOscillator(); gearOsc1.type = 'sawtooth';
    gearOsc2 = audioCtx.createOscillator(); gearOsc2.type = 'square';
    gearOsc3 = audioCtx.createOscillator(); gearOsc3.type = 'sawtooth';

    gearFilter = audioCtx.createBiquadFilter();
    gearFilter.type = 'bandpass';
    gearFilter.Q.value = 6.0; // Alta ressonância para timbre metálico

    gearGain = audioCtx.createGain();
    gearGain.gain.value = 0;

    gearOsc1.connect(gearFilter);
    gearOsc2.connect(gearFilter);
    gearOsc3.connect(gearFilter);
    gearFilter.connect(gearGain);
    gearGain.connect(audioCtx.destination);

    gearOsc1.start();
    gearOsc2.start();
    gearOsc3.start();

    gearVibrato = audioCtx.createOscillator();
    gearVibrato.type = 'sine'; 
    gearVibrato.frequency.value = 30; 

    gearVibratoGain = audioCtx.createGain();
    gearVibratoGain.gain.value = 0; 

    gearVibrato.connect(gearVibratoGain);
    gearVibratoGain.connect(gearOsc1.frequency);
    gearVibratoGain.connect(gearOsc2.frequency);
    gearVibratoGain.connect(gearOsc3.frequency);
    gearVibrato.start();
}

function playFlutter() {
    if (!audioCtx || !gameCar.installedTurbo) return;
    const now = audioCtx.currentTime;
    const bovSource = audioCtx.createBufferSource();
    bovSource.buffer = noiseBuffer;
    const bovGain = audioCtx.createGain();
    const bovFilter = audioCtx.createBiquadFilter();
    bovFilter.type = 'highpass';
    bovFilter.frequency.value = 4500;
    bovSource.connect(bovFilter);
    bovFilter.connect(bovGain);
    bovGain.connect(audioCtx.destination);
    bovGain.gain.setValueAtTime(0, now);
    bovGain.gain.linearRampToValueAtTime(0.25, now + 0.02);
    bovGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    bovSource.start(now);

    const pulses = 9;
    for (let i = 0; i < pulses; i++) {
        const pulseStart = now + 0.08 + (i * 0.08 * (1 + i * 0.1));
        const duration = 0.07;
        const fSource = audioCtx.createBufferSource();
        fSource.buffer = noiseBuffer;
        const fGain = audioCtx.createGain();
        const fFilter = audioCtx.createBiquadFilter();
        fFilter.type = 'bandpass';
        const centerFreq = 3200 - (i * 280);
        fFilter.frequency.setValueAtTime(Math.max(500, centerFreq), pulseStart);
        fFilter.Q.value = 18;

        fSource.connect(fFilter);
        fFilter.connect(fGain);
        fGain.connect(audioCtx.destination);

        const vol = 0.35 * Math.pow(0.78, i);
        fGain.gain.setValueAtTime(0, pulseStart);
        fGain.gain.linearRampToValueAtTime(vol, pulseStart + 0.01);
        fGain.gain.exponentialRampToValueAtTime(0.001, pulseStart + duration);

        fSource.start(pulseStart);
        fSource.stop(pulseStart + duration + 0.1);
    }
}

function playShiftSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(140, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.08);
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    osc.stop(now + 0.08);

    if (gameCar.installedTurbo && gameCar.currentRPM > 0.65) {
        setTimeout(playFlutter, 60);
    }
}

let lastAccelState = false;

function updateAudio() {
    if (!audioCtx || !isPlaying) return;

    // Adaptação para aceitar Gamepad analógico ou Teclado
    const accel = keys['w'] || gpInput.accel > 0.1;
    const rpm = gameCar.currentRPM; 

    // --- TEMPO DESDE A ÚLTIMA TROCA ---
    const timeSinceShift = performance.now() - lastShiftTime;
    const isShifting = timeSinceShift < 80;
    const shiftVolumeMult = isShifting ? 0.25 : 1.0; 

    // Motor Base Adaptado
    let baseFreq = gameCar.type === 'miata-body' ? 32 : (gameCar.type === 'bmw-body' ? 45 : 26);
    let freqMult = gameCar.type === 'miata-body' ? 85 : (gameCar.type === 'bmw-body' ? 140 : 105);
    const subMult = gameCar.type === 'bmw-body' ? 0.25 : 0.5;

    const targetFreq = baseFreq + (rpm * freqMult);
    engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);
    engineOsc2.frequency.setTargetAtTime(targetFreq * subMult, audioCtx.currentTime, 0.05);
    
    // Queda rápida do motor na troca
    const engineVol = (0.08 + (accel ? 0.12 : 0) + (rpm * 0.08)) * shiftVolumeMult;
    engineGain.gain.setTargetAtTime(engineVol, audioCtx.currentTime, isShifting ? 0.02 : 0.1);

    // Turbo Logic
    if (gameCar.installedTurbo) {
        if (accel && rpm > 0.35) {
            const boost = Math.pow(rpm, 2.2);
            const whistleF = 1200 + (rpm * 7000);
            turboSpoolOsc.frequency.setTargetAtTime(whistleF, audioCtx.currentTime, 0.1);
            turboSpoolGain.gain.setTargetAtTime(boost * 0.22, audioCtx.currentTime, 0.2);
            turboAirGain.gain.setTargetAtTime(boost * 0.15, audioCtx.currentTime, 0.25);
            turboVibrato.frequency.setTargetAtTime(20 + rpm * 40, audioCtx.currentTime, 0.1);
        } else {
            turboSpoolGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
            turboAirGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        }

        if (lastAccelState && !accel && rpm > 0.6) {
            playFlutter();
        }
    }

    // --- Lógica do Gearbox (Whine) da M3 GTR ---
    if (gameCar.type === 'bmw-body' && gearGain && gameCar.physics) {
        
        let v_m_s = Math.abs(gameCar.speed) * (15 / 3.6);
        let wheelRPM = (v_m_s / (2 * Math.PI * gameCar.physics.tireRadius)) * 60;
        let targetShaftRPM = wheelRPM * gameCar.physics.finalDrive;
        
        smoothedShaftRPM += (targetShaftRPM - smoothedShaftRPM) * 0.15; 

        // Frequência base a partir do eixo
        const baseGearFreq = 180 + (smoothedShaftRPM * 0.4); 

        // --- GEARBOX SCREAM WOBBLE (Pure Wobble, Stronger, Longer) ---
        let t = timeSinceShift / 1000; 
        let screamMultiplier = 1.0;
        let isTorqueCut = t < 0.08; 
        let extraGainMult = 1.0; 

        // Ampliado para durar até 330ms após o engate
        if (t >= 0.08 && t < 0.41) {
            let engageT = t - 0.08;
            let decay = Math.exp(-engageT * 8); 
            let wobble = Math.cos(engageT * 100) * 0.10 * decay; 
            screamMultiplier = 1.0 + wobble;

            if (engageT < 0.08) {
                let spikeDecay = 1 - (engageT / 0.08);
                extraGainMult = 1.0 + (0.20 * spikeDecay);
            }
        }

        const finalFreq = baseGearFreq * screamMultiplier;
        gearOsc1.frequency.setTargetAtTime(finalFreq, audioCtx.currentTime, 0.01);
        gearOsc2.frequency.setTargetAtTime(finalFreq * 1.5, audioCtx.currentTime, 0.01);
        gearOsc3.frequency.setTargetAtTime(finalFreq * 2.1, audioCtx.currentTime, 0.01);
        gearFilter.frequency.setTargetAtTime(Math.min(finalFreq * 1.8, 8000), audioCtx.currentTime, 0.02);
        gearVibratoGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);

        // --- VOLUME ---
        let loadVol = 0;
        if (isTorqueCut) {
            loadVol = 0.04; 
        } else if (accel) {
            loadVol = 0.35 * extraGainMult; 
        } else if (v_m_s > 8) {
            loadVol = 0.18 * extraGainMult; 
        }

        const speedFade = Math.min(v_m_s / 5, 1.0);
        gearGain.gain.setTargetAtTime(loadVol * speedFade, audioCtx.currentTime, isTorqueCut ? 0.01 : 0.03);

    } else if (gearGain) {
        gearGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }

    lastAccelState = accel;
}

// --- HANDLER DE GAMEPAD GLOBAL ---
function handleGamepadGlobals() {
    const gamepads = navigator.getGamepads ? navigator.getGamepads() :[];
    let gp = null;
    for (let i = 0; i < gamepads.length; i++) {
        if (gamepads[i] && gamepads[i].connected) { gp = gamepads[i]; break; }
    }

    const cursorEl = document.getElementById('virtualCursor');
    
    if (!gp) {
        if (cursorEl) cursorEl.style.display = 'none';
        gpInput = { steer: 0, accel: 0, brake: 0, handbrake: false };
        return;
    }

    // Leitura dos Gatilhos Proporcionais (RT = Acelerador, LT = Freio)
    gpInput.accel = gp.buttons[7] ? gp.buttons[7].value : 0;
    gpInput.brake = gp.buttons[6] ? gp.buttons[6].value : 0;
    
    // Leitura Joystick Esquerdo (Eixo X) com "Deadzone" para evitar drift
    gpInput.steer = gp.axes[0] || 0;
    if (Math.abs(gpInput.steer) < 0.15) gpInput.steer = 0; 

    // Mapeamento de Botões básicos
    gpInput.handbrake = gp.buttons[0] ? gp.buttons[0].pressed : false; // Botão A (ou X no PS) atua como freio de mão na pista
    
    let btnA = gp.buttons[0]?.pressed; 
    let btnL1 = gp.buttons[4]?.pressed; 
    let btnR1 = gp.buttons[5]?.pressed; 
    
    // Joystick Y (Eixo Y) para mover o cursor no menu
    let stickY = gp.axes[1] || 0;
    if (Math.abs(stickY) < 0.15) stickY = 0;

    // --- LÓGICA DO MENU ---
    if (!isPlaying) {
        cursorEl.style.display = 'block';
        vCursor.x += gpInput.steer * 15; // Velocidade do cursor
        vCursor.y += stickY * 15;
        
        // Mantém o cursor dentro da tela
        vCursor.x = Math.max(0, Math.min(window.innerWidth, vCursor.x));
        vCursor.y = Math.max(0, Math.min(window.innerHeight, vCursor.y));
        cursorEl.style.left = vCursor.x + 'px';
        cursorEl.style.top = vCursor.y + 'px';

        // Simula o "Clique" (Botão A) no botão que estiver em baixo do cursor
        if (btnA && !lastBtnA) {
            cursorEl.style.display = 'none'; // Esconde pra detectar o q tem embaixo
            let elem = document.elementFromPoint(vCursor.x, vCursor.y);
            cursorEl.style.display = 'block';
            if (elem) {
                let clickable = elem.closest('button, .custom-card, .menu-btn');
                if (clickable) clickable.click();
            }
        }

        // L1 / R1 para trocar de carro sem o mouse scroll
        if (garageView === 'info' && !isSwitching) {
            if (btnR1 && !lastBtnR1) {
                selectedCarIndex = (selectedCarIndex + 1) % carsData.length;
                updateGarageDisplay();
            } else if (btnL1 && !lastBtnL1) {
                selectedCarIndex = (selectedCarIndex - 1 + carsData.length) % carsData.length;
                updateGarageDisplay();
            }
        }
    } else {
        cursorEl.style.display = 'none'; // Esconde na corrida
    }

    lastBtnA = btnA; lastBtnR1 = btnR1; lastBtnL1 = btnL1;
}

function updateTransmission() {
    if (gameCar.type === 'bmw-body' && gameCar.physics) {
        let v_m_s = Math.abs(gameCar.speed) * (15 / 3.6);
        let wheelRPM = (v_m_s / (2 * Math.PI * gameCar.physics.tireRadius)) * 60;
        let shaftRPM = wheelRPM * gameCar.physics.finalDrive;
        let engineRPM = shaftRPM * gameCar.physics.gearRatios[gameCar.currentGear - 1];
        
        if (engineRPM < gameCar.physics.idleRPM && v_m_s < 1) engineRPM = gameCar.physics.idleRPM;

        if (engineRPM > 7800 && gameCar.currentGear < 6) {
            gameCar.currentGear++;
            playShiftSound();
            lastShiftTime = performance.now();
        } else if (engineRPM < 5000 && gameCar.currentGear > 1) {
            gameCar.currentGear--;
            playShiftSound();
            lastShiftTime = performance.now();
        }
        
        gameCar.currentRPM = Math.max(0, Math.min(1, engineRPM / gameCar.physics.maxRPM));
        document.getElementById('gearDisp').innerText = gameCar.currentGear;
        return; 
    }

    const speedRatio = Math.abs(gameCar.speed) / gameCar.maxSpeed;
    if (speedRatio > gameCar.gearThresholds[gameCar.currentGear] && gameCar.currentGear < 5) {
        gameCar.currentGear++; 
        playShiftSound(); 
        lastShiftTime = performance.now();
    } else if (speedRatio < gameCar.gearThresholds[gameCar.currentGear - 1] && gameCar.currentGear > 1) {
        gameCar.currentGear--; 
        playShiftSound(); 
        lastShiftTime = performance.now();
    }
    const minThreshold = gameCar.gearThresholds[gameCar.currentGear - 1];
    const maxThreshold = gameCar.gearThresholds[gameCar.currentGear];
    let gearProgress = (speedRatio - minThreshold) / (maxThreshold - minThreshold);
    gearProgress = Math.max(0, Math.min(1, gearProgress));
    gameCar.currentRPM = 0.3 + (gearProgress * 0.65);
    document.getElementById('gearDisp').innerText = gameCar.currentGear;
}

function update() {
    if(!isPlaying) return;

    updateTransmission();
    updateAudio();

    // HÍBRIDO (Teclado + Gamepad Proporcional)
    const currentAccel = Math.max(keys['w'] ? 1 : 0, gpInput.accel);
    const currentBrake = Math.max(keys['s'] ? 1 : 0, gpInput.brake);
    const isHandbraking = keys[' '] || gpInput.handbrake;

    let steerInput = 0;
    if (keys['a']) steerInput = -1;
    else if (keys['d']) steerInput = 1;
    else steerInput = gpInput.steer;

    // Preenchimento das Barras no HUD
    document.getElementById('accelBar').style.height = (currentAccel * 100) + '%';
    document.getElementById('brakeBar').style.height = (currentBrake * 100) + '%';

    const oldVx = gameCar.vx;
    const oldVy = gameCar.vy;

    if (gameCar.type === 'bmw-body' && gameCar.physics) {
        let v_m_s = gameCar.speed * (15 / 3.6); 
        let wheelRPM = (Math.abs(v_m_s) / (2 * Math.PI * gameCar.physics.tireRadius)) * 60;
        let engineRPM = wheelRPM * gameCar.physics.finalDrive * gameCar.physics.gearRatios[gameCar.currentGear - 1];
        
        let tractiveForce = 0;
        
        if (currentAccel > 0) {
            if (engineRPM < gameCar.physics.maxRPM) {
                let torque = 480;
                if (engineRPM > 7000) torque -= (engineRPM - 7000) * 0.15; 
                if (engineRPM < 3000) torque = 300 + (engineRPM / 3000) * 180; 
                
                let wheelTorque = torque * gameCar.physics.gearRatios[gameCar.currentGear - 1] * gameCar.physics.finalDrive * 0.85;
                tractiveForce = (wheelTorque / gameCar.physics.tireRadius) * currentAccel;
            }
        } else if (currentBrake > 0) {
            tractiveForce = -12000 * currentBrake; 
        }

        let dragForce = 0.5 * 1.2 * gameCar.physics.dragCd * gameCar.physics.frontalArea * (v_m_s * v_m_s);
        let rollingRes = 0.015 * gameCar.physics.mass * 9.81; 
        let totalRes = dragForce + rollingRes;

        if (gameCar.speed > 0) tractiveForce -= totalRes;
        else if (gameCar.speed < 0) tractiveForce += totalRes;

        let accel_m_s2 = tractiveForce / gameCar.physics.mass;
        v_m_s += accel_m_s2 * (1 / 60); 
        
        gameCar.speed = v_m_s / (15 / 3.6); 
        if (gameCar.speed < -8) gameCar.speed = -8; 

    } else {
        if (currentAccel > 0) {
            const accelModifier = gameCar.gearAcelRates[gameCar.currentGear - 1];
            if (gameCar.speed < gameCar.maxSpeed) {
                gameCar.speed += (gameCar.baseAccel * accelModifier * 0.4 * currentAccel) * (1 - (gameCar.speed/gameCar.maxSpeed));
            }
        } else if (currentBrake > 0) {
            gameCar.speed -= gameCar.baseAccel * 0.9 * currentBrake;
        } else {
            gameCar.speed *= (1 - gameCar.friction);
        }
    }

    if (Math.abs(gameCar.speed) > 0.5) {
        const dir = gameCar.speed > 0 ? 1 : -1;
        let steer = steerInput;
        gameCar.angularVel += steer * 0.0055 * dir * (isHandbraking ? 1.8 : 1.0);
    }
    
    gameCar.angularVel *= 0.9;
    gameCar.angle += gameCar.angularVel;

    const fvx = Math.cos(gameCar.angle) * gameCar.speed;
    const fvy = Math.sin(gameCar.angle) * gameCar.speed;
    const driftIntensity = isHandbraking ? 0.04 : gameCar.driftFactor;
    gameCar.vx += (fvx - gameCar.vx) * driftIntensity;
    gameCar.vy += (fvy - gameCar.vy) * driftIntensity;
    gameCar.x += gameCar.vx;
    gameCar.y += gameCar.vy;

    const kmh = Math.floor(Math.sqrt(gameCar.vx**2 + gameCar.vy**2) * 15);
    document.getElementById('speedDisp').innerText = kmh;
    document.getElementById('gaugeNeedle').style.transform = `translateX(-50%) rotate(${-120 + (gameCar.currentRPM * 240)}deg)`;

    const targetGx = ((gameCar.vx - oldVx) * Math.cos(gameCar.angle) + (gameCar.vy - oldVy) * Math.sin(gameCar.angle)) * 80;
    const targetGy = ((gameCar.vx - oldVx) * -Math.sin(gameCar.angle) + (gameCar.vy - oldVy) * Math.cos(gameCar.angle)) * 80;
    gameCar.gX += (targetGx - gameCar.gX) * 0.1;
    gameCar.gY += (targetGy - gameCar.gY) * 0.1;

    const distance = Math.sqrt(gameCar.gX**2 + gameCar.gY**2);
    const maxRadius = 45;
    let finalX = gameCar.gX; let finalY = gameCar.gY;
    if (distance > maxRadius) { const ratio = maxRadius / distance; finalX *= ratio; finalY *= ratio; }
    document.getElementById('accelDot').style.transform = `translate(${-finalY}px, ${finalX}px)`;

    const driftGap = Math.sqrt((fvx-gameCar.vx)**2 + (fvy-gameCar.vy)**2);
    if (driftGap > 1.3 || isHandbraking) {
        gameCar.skidmarks.push({x: gameCar.x, y: gameCar.y, angle: gameCar.angle, life: 1});
        if(Math.random() > 0.4) {
            const tX = -gameCar.height / 2.5; const tY = gameCar.width / 2.5;
            const p1x = gameCar.x + tX * Math.cos(gameCar.angle) - tY * Math.sin(gameCar.angle);
            const p1y = gameCar.y + tX * Math.sin(gameCar.angle) + tY * Math.cos(gameCar.angle);
            const p2x = gameCar.x + tX * Math.cos(gameCar.angle) + tY * Math.sin(gameCar.angle);
            const p2y = gameCar.y + tX * Math.sin(gameCar.angle) - tY * Math.cos(gameCar.angle);[ {x:p1x, y:p1y}, {x:p2x, y:p2y} ].forEach(pos => {
                gameCar.particles.push({ x: pos.x, y: pos.y, size: Math.random()*5+4, opacity: 0.5, vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2 });
            });
        }
    }

    gameCar.skidmarks.forEach((s, i) => { s.life -= 0.003; if(s.life <= 0) gameCar.skidmarks.splice(i, 1); });
    gameCar.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.opacity -= 0.02; p.size += 0.4; if(p.opacity <= 0) gameCar.particles.splice(i, 1); });

    if (gameCar.x > canvas.width + 50) gameCar.x = -50;
    if (gameCar.x < -50) gameCar.x = canvas.width + 50;
    if (gameCar.y > canvas.height + 50) gameCar.y = -50;
    if (gameCar.y < -50) gameCar.y = canvas.height + 50;
}

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    gameCar.skidmarks.forEach(s => {
        ctx.fillStyle = `rgba(0,0,0,${s.life * 0.3})`;
        ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle);
        ctx.fillRect(-gameCar.height/2, -gameCar.width/2.5, 6, 4);
        ctx.fillRect(-gameCar.height/2, gameCar.width/2.5 - 4, 6, 4);
        ctx.restore();
    });
    
    gameCar.particles.forEach(p => {
        ctx.fillStyle = `rgba(120,120,120,${p.opacity})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });
    
    ctx.save();
    ctx.translate(gameCar.x, gameCar.y); ctx.rotate(gameCar.angle);
    
    ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-gameCar.height/2+4, -gameCar.width/2+4, gameCar.height, gameCar.width);
    ctx.shadowBlur = 0;
    
    const carH = gameCar.height;
    const carW = gameCar.width;
    const grad = ctx.createLinearGradient(0, -carW/2, 0, carW/2);
    grad.addColorStop(0, gameCar.darkColor); grad.addColorStop(0.5, gameCar.mainColor); grad.addColorStop(1, gameCar.darkColor);
    
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(-carH/2, -carW/2, carH, carW, gameCar.type === 'miata-body' ? 10 : 5); ctx.fill();
    
    if (gameCar.type === 'bmw-body') {
        ctx.fillStyle = gameCar.mainColor;
        ctx.beginPath(); ctx.roundRect(carH/2 - 25, -carW/2 - 2, 20, carW + 4, 3); ctx.fill();
        ctx.beginPath(); ctx.roundRect(-carH/2 + 5, -carW/2 - 3, 25, carW + 6, 3); ctx.fill();
        
        ctx.fillStyle = '#111';
        ctx.fillRect(carH/2 - 2, -carW/2 - 3, 6, carW + 6);
        
        ctx.fillStyle = '#000';
        ctx.fillRect(10, carW/2, 8, 4);
        
        ctx.fillStyle = '#111';
        ctx.fillRect(-carH/2 + 8, -carW/4, 4, carW/2); 
        ctx.fillRect(-carH/2, -carW/2 - 5, 10, carW + 10); 
        ctx.fillRect(-carH/2 - 2, -carW/2 - 5, 14, 2); 
        ctx.fillRect(-carH/2 - 2, carW/2 + 3, 14, 2);  
    } else if (gameCar.type === 'skyline-body') {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(-carH/2, -carW/6, carH, carW/12); ctx.fillRect(-carH/2, carW/12, carH, carW/12);
    }
    
    if (gameCar.type === 'skyline-body') {
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 5; ctx.shadowColor = 'white';
        ctx.fillRect(carH/2 - 14, -carW/2 + 2, 12, 10); ctx.fillRect(carH/2 - 14, carW/2 - 12, 12, 10);
        ctx.shadowBlur = 0;
    } else if (gameCar.type === 'bmw-body') {
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 5; ctx.shadowColor = 'white';
        ctx.fillRect(carH/2 - 12, -carW/2 + 2, 8, 8); ctx.fillRect(carH/2 - 12, carW/2 - 10, 8, 8);
        ctx.shadowBlur = 0;
    } else {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(carH/2 - 12, -carW/2.5, 10, 6); ctx.fillRect(carH/2 - 12, carW/2.5 - 6, 10, 6); 
    }
    
    ctx.fillStyle = '#1c2833';
    ctx.beginPath(); ctx.roundRect(carH/2 - 50, -carW/2.6, 25, carW/1.3, 3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(-carH/2 + 10, -carW/3.2, 12, carW/1.6, 2); ctx.fill();
    
    if (gameCar.type === 'skyline-body') {
        ctx.fillStyle = '#600'; 
        ctx.beginPath(); ctx.arc(-carH/2 + 3, -carW/4, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(-carH/2 + 3, carW/4, 4, 0, Math.PI*2); ctx.fill();
        if (keys['s'] || gpInput.brake > 0 || keys[' '] || gpInput.handbrake) {
            ctx.fillStyle = '#f00'; ctx.shadowBlur = 15; ctx.shadowColor = 'red';
            ctx.beginPath(); ctx.arc(-carH/2 + 3, -carW/4, 4.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(-carH/2 + 3, carW/4, 4.5, 0, Math.PI*2); ctx.fill();
        }
    } else if (gameCar.type === 'bmw-body') { 
        ctx.fillStyle = '#a00';
        ctx.fillRect(-carH/2, -carW/2 + 2, 4, 12);
        ctx.fillRect(-carH/2, carW/2 - 14, 4, 12);
        if (keys['s'] || gpInput.brake > 0 || keys[' '] || gpInput.handbrake) {
            ctx.fillStyle = '#ff1111'; ctx.shadowBlur = 15; ctx.shadowColor = 'red';
            ctx.fillRect(-carH/2, -carW/2 + 2, 4, 12);
            ctx.fillRect(-carH/2, carW/2 - 14, 4, 12);
        }
    } else {
        if (keys['s'] || gpInput.brake > 0 || keys[' '] || gpInput.handbrake) {
            ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 15; ctx.shadowColor = 'red';
            ctx.fillRect(-carH/2, -carW/2+2, 4, 8); ctx.fillRect(-carH/2, carW/2-10, 4, 8);
        }
    }
    
    ctx.shadowBlur = 0;
    ctx.restore();
}

function loop() { 
    handleGamepadGlobals(); // Checa input de Menu e Gamepad 
    update(); 
    draw(); 
    requestAnimationFrame(loop); 
}
canvas.style.filter = 'blur(10px)';
loop();

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();
</script>
